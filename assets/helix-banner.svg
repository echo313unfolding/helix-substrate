<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="helixGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#00d4ff;#7c3aed;#00d4ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1">
        <animate attributeName="stop-color" values="#7c3aed;#06b6d4;#7c3aed" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1">
        <animate attributeName="stop-color" values="#06b6d4;#00d4ff;#06b6d4" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>
  <rect width="800" height="200" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Animated helix strands -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Strand 1 -->
    <path d="M 60,100 Q 120,40 180,100 Q 240,160 300,100 Q 360,40 420,100 Q 480,160 540,100 Q 600,40 660,100 Q 720,160 740,100" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="d"
        values="M 60,100 Q 120,40 180,100 Q 240,160 300,100 Q 360,40 420,100 Q 480,160 540,100 Q 600,40 660,100 Q 720,160 740,100;
                M 60,100 Q 120,160 180,100 Q 240,40 300,100 Q 360,160 420,100 Q 480,40 540,100 Q 600,160 660,100 Q 720,40 740,100;
                M 60,100 Q 120,40 180,100 Q 240,160 300,100 Q 360,40 420,100 Q 480,160 540,100 Q 600,40 660,100 Q 720,160 740,100"
        dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Strand 2 -->
    <path d="M 60,100 Q 120,160 180,100 Q 240,40 300,100 Q 360,160 420,100 Q 480,40 540,100 Q 600,160 660,100 Q 720,40 740,100" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="d"
        values="M 60,100 Q 120,160 180,100 Q 240,40 300,100 Q 360,160 420,100 Q 480,40 540,100 Q 600,160 660,100 Q 720,40 740,100;
                M 60,100 Q 120,40 180,100 Q 240,160 300,100 Q 360,40 420,100 Q 480,160 540,100 Q 600,40 660,100 Q 720,160 740,100;
                M 60,100 Q 120,160 180,100 Q 240,40 300,100 Q 360,160 420,100 Q 480,40 540,100 Q 600,160 660,100 Q 720,40 740,100"
        dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Rungs connecting strands -->
    <g opacity="0.4">
      <line x1="120" y1="70" x2="120" y2="130" stroke="#30d5c8" stroke-width="1">
        <animate attributeName="y1" values="70;130;70" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="130;70;130" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="180" y1="100" x2="180" y2="100" stroke="#30d5c8" stroke-width="1"/>
      <line x1="240" y1="130" x2="240" y2="70" stroke="#30d5c8" stroke-width="1">
        <animate attributeName="y1" values="130;70;130" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="70;130;70" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="360" y1="70" x2="360" y2="130" stroke="#30d5c8" stroke-width="1">
        <animate attributeName="y1" values="70;130;70" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="130;70;130" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="480" y1="130" x2="480" y2="70" stroke="#30d5c8" stroke-width="1">
        <animate attributeName="y1" values="130;70;130" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="70;130;70" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="600" y1="70" x2="600" y2="130" stroke="#30d5c8" stroke-width="1">
        <animate attributeName="y1" values="70;130;70" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="130;70;130" dur="3s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- Title text -->
  <text x="400" y="88" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="38" font-weight="700" fill="url(#helixGrad)" letter-spacing="2">
    helix-substrate
  </text>

  <!-- Subtitle -->
  <text x="400" y="118" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#8b949e" letter-spacing="1">
    compressed-domain inference for PyTorch
  </text>

  <!-- Stats bar -->
  <g font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#58a6ff">
    <text x="160" y="155" text-anchor="middle">
      <tspan fill="#7c3aed">▪</tspan> 4.33× compression
    </text>
    <text x="400" y="155" text-anchor="middle">
      <tspan fill="#00d4ff">▪</tspan> 20 tok/s on RTX 4090
    </text>
    <text x="630" y="155" text-anchor="middle">
      <tspan fill="#06b6d4">▪</tspan> 8 architectures proven
    </text>
  </g>

  <!-- Thin accent line -->
  <rect x="100" y="170" width="600" height="1" rx="1" fill="url(#helixGrad)" opacity="0.3"/>
</svg>